AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Bedrock Production Support Chatbot — IAM, S3, OpenSearch Serverless,
  Bedrock Knowledge Base & Agent, Lambda, API Gateway, EventBridge, CloudWatch.

# ── Parameters ───────────────────────────────────────────────────────────────

Parameters:

  S3BucketName:
    Type: String
    Default: prod-support-kb-docs
    Description: S3 bucket for knowledge-base documents (must be globally unique).

  ArtifactsBucket:
    Type: String
    Description: S3 bucket that holds the packaged Lambda zip files.

  CollectionName:
    Type: String
    Default: prod-support-kb
    Description: OpenSearch Serverless collection name.

  VectorIndexName:
    Type: String
    Default: prod-support-index
    Description: OpenSearch Serverless vector index name.

  AgentInstruction:
    Type: String
    Description: System prompt for the Bedrock Agent (loaded from bedrock/instruction.txt).

  SNSAlertsArn:
    Type: String
    Default: ""
    Description: Optional SNS topic ARN for CloudWatch alarm notifications.

Conditions:
  HasSNS: !Not [!Equals [!Ref SNSAlertsArn, ""]]

Resources:

  # ── IAM ──────────────────────────────────────────────────────────────────

  BedrockAgentRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: BedrockAgentRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: bedrock.amazonaws.com
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId
      Policies:
        - PolicyName: BedrockAgentPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeAgent
                  - bedrock:Retrieve
                  - bedrock:StartIngestionJob
                  - bedrock:GetIngestionJob
                  - bedrock:ListIngestionJobs
                Resource: "*"
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !Sub "arn:aws:s3:::${S3BucketName}"
                  - !Sub "arn:aws:s3:::${S3BucketName}/*"
              - Effect: Allow
                Action: aoss:APIAccessAll
                Resource: !Sub "arn:aws:aoss:${AWS::Region}:${AWS::AccountId}:collection/*"

  LambdaBedrockRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: LambdaBedrockRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: LambdaBedrockPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeAgent
                  - bedrock:StartIngestionJob
                  - bedrock:GetIngestionJob
                  - bedrock:ListIngestionJobs
                Resource: "*"
              - Effect: Allow
                Action: cloudwatch:PutMetricData
                Resource: "*"

  AossIndexCreatorRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: AossIndexCreatorRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: AossAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: aoss:APIAccessAll
                Resource: !Sub "arn:aws:aoss:${AWS::Region}:${AWS::AccountId}:collection/*"

  # ── S3 ───────────────────────────────────────────────────────────────────

  KBDocsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref S3BucketName
      VersioningConfiguration:
        Status: Enabled
      NotificationConfiguration:
        EventBridgeConfiguration:
          EventBridgeEnabled: true

  # ── OpenSearch Serverless ─────────────────────────────────────────────────

  AOSSEncryptionPolicy:
    Type: AWS::OpenSearchServerless::SecurityPolicy
    Properties:
      Name: !Sub "${CollectionName}-enc"
      Type: encryption
      Policy: !Sub '{"Rules":[{"ResourceType":"collection","Resource":["collection/${CollectionName}"]}],"AWSOwnedKey":true}'

  AOSSNetworkPolicy:
    Type: AWS::OpenSearchServerless::SecurityPolicy
    Properties:
      Name: !Sub "${CollectionName}-net"
      Type: network
      Policy: !Sub '[{"Rules":[{"ResourceType":"collection","Resource":["collection/${CollectionName}"]},{"ResourceType":"dashboard","Resource":["collection/${CollectionName}"]}],"AllowFromPublic":true}]'

  AOSSCollection:
    Type: AWS::OpenSearchServerless::Collection
    DependsOn:
      - AOSSEncryptionPolicy
      - AOSSNetworkPolicy
    Properties:
      Name: !Ref CollectionName
      Type: VECTORSEARCH
      Description: Vector store for Bedrock Knowledge Base

  AOSSAccessPolicy:
    Type: AWS::OpenSearchServerless::AccessPolicy
    Properties:
      Name: !Sub "${CollectionName}-access"
      Type: data
      Policy: !Sub
        - '[{"Rules":[{"ResourceType":"index","Resource":["index/${CollectionName}/*"],"Permission":["aoss:CreateIndex","aoss:DescribeIndex","aoss:ReadDocument","aoss:WriteDocument","aoss:UpdateIndex","aoss:DeleteIndex"]},{"ResourceType":"collection","Resource":["collection/${CollectionName}"],"Permission":["aoss:CreateCollectionItems","aoss:DeleteCollectionItems","aoss:UpdateCollectionItems","aoss:DescribeCollectionItems"]}],"Principal":["${BedrockArn}","${IndexCreatorArn}","arn:aws:iam::${AWS::AccountId}:root"]}]'
        - BedrockArn: !GetAtt BedrockAgentRole.Arn
          IndexCreatorArn: !GetAtt AossIndexCreatorRole.Arn

  # ── Custom Resource: AOSS Vector Index ───────────────────────────────────
  # CloudFormation has no native AWS::OpenSearchServerless::Index resource.
  # Source: lambda/aoss_index_creator.py

  AossIndexCreatorFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: aoss-index-creator
      Runtime: python3.12
      Handler: aoss_index_creator.handler
      Role: !GetAtt AossIndexCreatorRole.Arn
      Timeout: 300
      Code:
        S3Bucket: !Ref ArtifactsBucket
        S3Key: lambda/aoss_index_creator.zip

  AossIndex:
    Type: Custom::AossIndex
    DependsOn: AOSSAccessPolicy
    Properties:
      ServiceToken: !GetAtt AossIndexCreatorFunction.Arn
      CollectionEndpoint: !GetAtt AOSSCollection.CollectionEndpoint
      IndexName: !Ref VectorIndexName
      Region: !Ref AWS::Region

  # ── Bedrock Knowledge Base ────────────────────────────────────────────────

  BedrockKnowledgeBase:
    Type: AWS::Bedrock::KnowledgeBase
    DependsOn: AossIndex
    Properties:
      Name: prod-support-kb
      Description: Production support knowledge base
      RoleArn: !GetAtt BedrockAgentRole.Arn
      KnowledgeBaseConfiguration:
        Type: VECTOR
        VectorKnowledgeBaseConfiguration:
          EmbeddingModelArn: !Sub "arn:aws:bedrock:${AWS::Region}::foundation-model/amazon.titan-embed-text-v2:0"
      StorageConfiguration:
        Type: OPENSEARCH_SERVERLESS
        OpensearchServerlessConfiguration:
          CollectionArn: !GetAtt AOSSCollection.Arn
          VectorIndexName: !Ref VectorIndexName
          FieldMapping:
            VectorField: bedrock-knowledge-base-default-vector
            TextField: AMAZON_BEDROCK_TEXT_CHUNK
            MetadataField: AMAZON_BEDROCK_METADATA

  BedrockDataSource:
    Type: AWS::Bedrock::DataSource
    Properties:
      Name: s3-docs-source
      KnowledgeBaseId: !Ref BedrockKnowledgeBase
      DataSourceConfiguration:
        Type: S3
        S3Configuration:
          BucketArn: !GetAtt KBDocsBucket.Arn
      VectorIngestionConfiguration:
        ChunkingConfiguration:
          ChunkingStrategy: SEMANTIC
          SemanticChunkingConfiguration:
            MaxTokens: 512
            BufferSize: 0
            BreakpointPercentileThreshold: 95

  # ── Bedrock Agent ─────────────────────────────────────────────────────────

  BedrockAgent:
    Type: AWS::Bedrock::Agent
    Properties:
      AgentName: prod-support-triage-bot
      Description: Production incident triage and resolution assistant
      AgentResourceRoleArn: !GetAtt BedrockAgentRole.Arn
      FoundationModel: anthropic.claude-3-sonnet-20240229-v1:0
      Instruction: !Ref AgentInstruction
      IdleSessionTTLInSeconds: 1800
      AutoPrepare: true
      KnowledgeBases:
        - KnowledgeBaseId: !Ref BedrockKnowledgeBase
          Description: Production support knowledge base
          KnowledgeBaseState: ENABLED

  BedrockAgentAlias:
    Type: AWS::Bedrock::AgentAlias
    Properties:
      AgentId: !Ref BedrockAgent
      AgentAliasName: production
      Description: Production alias

  # ── Lambda ────────────────────────────────────────────────────────────────
  # Source files: lambda/chatbot_handler.py, lambda/ingest_handler.py

  ChatbotFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: bedrock-support-chatbot
      Runtime: python3.12
      Handler: chatbot_handler.lambda_handler
      Role: !GetAtt LambdaBedrockRole.Arn
      Timeout: 60
      MemorySize: 256
      Environment:
        Variables:
          BEDROCK_AGENT_ID: !Ref BedrockAgent
          BEDROCK_AGENT_ALIAS_ID: !GetAtt BedrockAgentAlias.AgentAliasId
          AWS_REGION_NAME: !Ref AWS::Region
      Code:
        S3Bucket: !Ref ArtifactsBucket
        S3Key: lambda/chatbot.zip

  IngestFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: bedrock-kb-ingest
      Runtime: python3.12
      Handler: ingest_handler.lambda_handler
      Role: !GetAtt LambdaBedrockRole.Arn
      Timeout: 60
      Environment:
        Variables:
          KNOWLEDGE_BASE_ID: !Ref BedrockKnowledgeBase
          DATA_SOURCE_ID: !Ref BedrockDataSource
      Code:
        S3Bucket: !Ref ArtifactsBucket
        S3Key: lambda/ingest.zip

  # ── API Gateway (HTTP API) ────────────────────────────────────────────────

  ChatbotApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: bedrock-chatbot-api
      ProtocolType: HTTP
      CorsConfiguration:
        AllowMethods: [POST]
        AllowOrigins: ["*"]
        AllowHeaders: [Content-Type]

  ChatbotIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref ChatbotApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt ChatbotFunction.Arn
      PayloadFormatVersion: "2.0"

  ChatbotRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ChatbotApi
      RouteKey: "POST /chat"
      Target: !Sub "integrations/${ChatbotIntegration}"

  ChatbotStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref ChatbotApi
      StageName: "$default"
      AutoDeploy: true

  ChatbotApiPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ChatbotFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ChatbotApi}/*/*/chat"

  # ── EventBridge Rules ─────────────────────────────────────────────────────

  S3IngestRule:
    Type: AWS::Events::Rule
    Properties:
      Name: bedrock-kb-s3-trigger
      Description: Trigger KB ingestion when documents are uploaded to S3
      EventPattern:
        source: [aws.s3]
        detail-type: ["Object Created"]
        detail:
          bucket:
            name: [!Ref S3BucketName]
          object:
            key:
              - prefix: "incident-history/"
              - prefix: "app-features/"
              - prefix: "runbooks/"
      Targets:
        - Id: IngestLambda
          Arn: !GetAtt IngestFunction.Arn

  S3IngestPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref IngestFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt S3IngestRule.Arn

  WeeklySyncRule:
    Type: AWS::Events::Rule
    Properties:
      Name: bedrock-kb-weekly-sync
      Description: Full KB re-sync every Sunday at 02:00 UTC
      ScheduleExpression: "cron(0 2 ? * SUN *)"
      Targets:
        - Id: IngestLambda
          Arn: !GetAtt IngestFunction.Arn

  WeeklySyncPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref IngestFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt WeeklySyncRule.Arn

  # ── CloudWatch Alarms & Dashboard ─────────────────────────────────────────

  IngestionFailureAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: BedrockKBIngestionFailure
      MetricName: Errors
      Namespace: AWS/Lambda
      Dimensions:
        - Name: FunctionName
          Value: !Ref IngestFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions: !If [HasSNS, [!Ref SNSAlertsArn], []]

  HighLatencyAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: BedrockChatbotHighLatency
      MetricName: Duration
      Namespace: AWS/Lambda
      Dimensions:
        - Name: FunctionName
          Value: !Ref ChatbotFunction
      ExtendedStatistic: p99
      Period: 60
      EvaluationPeriods: 3
      Threshold: 10000
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions: !If [HasSNS, [!Ref SNSAlertsArn], []]

  MonitoringDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: BedrockSupportChatbot
      DashboardBody: !Sub |
        {"widgets":[
          {"type":"metric","x":0,"y":0,"width":12,"height":6,"properties":{"title":"Chatbot Invocations & Errors","metrics":[["AWS/Lambda","Invocations","FunctionName","${ChatbotFunction}"],["AWS/Lambda","Errors","FunctionName","${ChatbotFunction}"]],"period":60,"stat":"Sum","view":"timeSeries"}},
          {"type":"metric","x":12,"y":0,"width":12,"height":6,"properties":{"title":"Chatbot p99 Latency (ms)","metrics":[["AWS/Lambda","Duration","FunctionName","${ChatbotFunction}"]],"period":60,"stat":"p99","view":"timeSeries"}},
          {"type":"metric","x":0,"y":6,"width":12,"height":6,"properties":{"title":"KB Ingestion Invocations & Errors","metrics":[["AWS/Lambda","Invocations","FunctionName","${IngestFunction}"],["AWS/Lambda","Errors","FunctionName","${IngestFunction}"]],"period":300,"stat":"Sum","view":"timeSeries"}}
        ]}

# ── Outputs ───────────────────────────────────────────────────────────────────

Outputs:
  ApiEndpoint:
    Description: Chat API endpoint URL
    Value: !Sub "https://${ChatbotApi}.execute-api.${AWS::Region}.amazonaws.com/chat"

  KnowledgeBaseId:
    Value: !Ref BedrockKnowledgeBase
    Export:
      Name: !Sub "${AWS::StackName}-KbId"

  DataSourceId:
    Value: !Ref BedrockDataSource
    Export:
      Name: !Sub "${AWS::StackName}-DsId"

  AgentId:
    Value: !Ref BedrockAgent
    Export:
      Name: !Sub "${AWS::StackName}-AgentId"

  AgentAliasId:
    Value: !GetAtt BedrockAgentAlias.AgentAliasId
    Export:
      Name: !Sub "${AWS::StackName}-AliasId"

  BucketName:
    Value: !Ref KBDocsBucket
    Export:
      Name: !Sub "${AWS::StackName}-Bucket"
